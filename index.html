<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Favicon and App Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo-192.svg" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#142850" />
    <meta name="theme-color" content="#142850" />
    <script
      async
      src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1024036460838305"
      crossorigin="anonymous"
    ></script>
    <!-- Responsive meta tag -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=5.0"
    />

    <!-- Cache Control Meta Tags - Force fresh content for iPhone users -->
    <meta
      http-equiv="Cache-Control"
      content="no-cache, no-store, must-revalidate"
    />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />

    <!-- Primary Meta Tags -->
    <title>Caskmaf Datahub — Powering smarter, connected data commerce</title>
    <meta
      name="title"
      content="Caskmaf Datahub — Powering smarter, connected data commerce"
    />
    <meta
      name="description"
      content="Get instant mobile data bundles from verified agents across Ghana. MTN, Vodafone, AirtelTigo and more. Fast, reliable, no hassle."
    />
    <meta
      name="keywords"
      content="Caskmaf Datahub, telecom, data bundles, Ghana, mobile data, airtime, platform"
    />
    <meta name="author" content="Caskmaf Datahub" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://caskmafdatahub.shop/" />
    <meta
      property="og:title"
      content="Caskmaf Datahub — Powering smarter, connected data commerce"
    />
    <meta
      property="og:description"
      content="Get instant mobile data bundles from verified agents across Ghana. MTN, Vodafone, AirtelTigo and more. Fast, reliable, no hassle."
    />
    <meta property="og:image" content="/logo-512.svg" />
    <meta property="og:image:width" content="512" />
    <meta property="og:image:height" content="512" />
    <meta property="og:image:alt" content="Caskmaf Datahub Logo" />
    <meta property="og:site_name" content="Caskmaf Datahub" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://caskmafdatahub.shop/" />
    <meta
      property="twitter:title"
      content="Caskmaf Datahub — Powering smarter, connected data commerce"
    />
    <meta
      property="twitter:description"
      content="Get instant mobile data bundles from verified agents across Ghana. MTN, Vodafone, AirtelTigo and more. Fast, reliable, no hassle."
    />
    <meta property="twitter:image" content="/logo-512.svg" />
    <meta property="twitter:image:alt" content="Caskmaf Datahub Logo" />
    <meta property="twitter:creator" content="@caskmafdatahub" />
    <meta property="twitter:site" content="@caskmafdatahub" />

    <!-- Additional SEO Meta Tags -->
    <meta name="application-name" content="Caskmaf Datahub" />
    <meta name="apple-mobile-web-app-title" content="Caskmaf Datahub" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Preconnect to third-party domains -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Font -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://caskmafdatahub.shop/" />

    <!-- DNS Prefetch for better performance -->
    <link rel="dns-prefetch" href="//api.caskmafdatahub.shop" />

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Caskmaf Datahub",
        "description": "Modern telecom solutions platform",
        "url": "https://caskmafdatahub.shop",
        "logo": "https://caskmafdatahub.shop/logo-512.svg",

          "https://twitter.com/caskmafdatahub",
          "https://linkedin.com/company/caskmafdatahub"
        ],
        "contactPoint": {
          "@type": "ContactPoint",
          "contactType": "customer service",
          "areaServed": "GH",
          "availableLanguage": "English"
        }
      }
    </script>
